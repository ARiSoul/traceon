<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traceon.Blazor</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="lib/bootstrap-icons/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
    <link rel="icon" type="image/png" href="favicon.png?v=2" />
    <link href="Traceon.Blazor.styles.css" rel="stylesheet" />
    <link href="_content/Blazor-ApexCharts/css/apexcharts.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        document.addEventListener("focusin", function (e) {
            if (e.target.hasAttribute("data-select-on-focus")) {
                e.target.select();
            }
        });
        window.scrollToElement = function (element) {
            if (element) element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        };
        window.applyTheme = function (theme) {
            if (theme === 'dark' || theme === 'light') {
                document.documentElement.setAttribute('data-bs-theme', theme);
            } else {
                document.documentElement.removeAttribute('data-bs-theme');
            }
        };
        window.downloadFileFromStream = async function (fileName, streamRef) {
            const blob = new Blob([await streamRef.arrayBuffer()]);
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };
        /**
         * Compresses an image from a Blazor InputFile stream to a JPEG under maxBytes.
         * Returns a base64 data-URL string that can be decoded back to a byte array in C#.
         */
        window.compressImage = function (dotNetStreamRef, maxWidth, maxBytes) {
            return new Promise(async (resolve, reject) => {
                try {
                    const buffer = await dotNetStreamRef.arrayBuffer();
                    const blob = new Blob([buffer]);
                    const bmp = await createImageBitmap(blob);

                    // Scale down if wider than maxWidth, preserving aspect ratio
                    let w = bmp.width, h = bmp.height;
                    if (w > maxWidth) {
                        h = Math.round(h * maxWidth / w);
                        w = maxWidth;
                    }

                    const canvas = new OffscreenCanvas(w, h);
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(bmp, 0, 0, w, h);
                    bmp.close();

                    // Binary-search for the highest JPEG quality that stays under maxBytes
                    let lo = 0.3, hi = 0.92, result = null;
                    for (let i = 0; i < 6; i++) {
                        const mid = (lo + hi) / 2;
                        const b = await canvas.convertToBlob({ type: 'image/jpeg', quality: mid });
                        if (b.size <= maxBytes) {
                            result = b;
                            lo = mid;
                        } else {
                            hi = mid;
                        }
                    }
                    // If even the lowest quality is too large, just use it (best effort)
                    if (!result) {
                        result = await canvas.convertToBlob({ type: 'image/jpeg', quality: 0.3 });
                    }

                    const arr = new Uint8Array(await result.arrayBuffer());
                    resolve(arr);
                } catch (e) {
                    reject(e);
                }
            });
        };
    </script>
</body>

</html>
