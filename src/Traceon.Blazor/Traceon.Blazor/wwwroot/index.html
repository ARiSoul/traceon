<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traceon.Blazor</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Traceon.Blazor.styles.css" rel="stylesheet" />
    <link href="_content/Blazor-ApexCharts/css/apexcharts.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        document.addEventListener("focusin", function (e) {
            if (e.target.hasAttribute("data-select-on-focus")) {
                e.target.select();
            }
        });
        window.scrollToElement = function (element) {
            if (element) element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        };
        window.applyTheme = function (theme) {
            if (theme === 'dark' || theme === 'light') {
                document.documentElement.setAttribute('data-bs-theme', theme);
            } else {
                document.documentElement.removeAttribute('data-bs-theme');
            }
        };
        window.downloadFileFromStream = async function (fileName, streamRef) {
            const blob = new Blob([await streamRef.arrayBuffer()]);
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };
    </script>
</body>

</html>
